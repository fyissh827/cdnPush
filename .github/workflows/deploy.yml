name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 4. Build project (if build script exists)
      - name: Build project
        run: npm run build || echo "No build step"

      # 5. Deploy to VPS via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "Starting deployment..."

            cd /root/fyish/cdnPush

            # Reset repo to avoid conflicts
            git fetch origin
            git reset --hard origin/main

            # Ensure docker network exists
            # docker network create app_net || true

            # Stop old containers
            docker compose -f server-compose.yml down || true

            # Explicitly build Node.js Dockerfile
            docker build --no-cache -t cdnpush:latest .

            # Start containers using docker-compose
            docker compose -f server-compose.yml up -d

            echo "Deployment finished successfully"